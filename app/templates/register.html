<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Smart Task Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body class="auth-page" data-page="register">
    <div class="auth-container">
      <div class="auth-card">
        <div style="text-align: center; margin-bottom: 32px;">
          <i class="fas fa-user-circle" style="font-size: 3rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 16px;"></i>
          <h1>Create Account</h1>
          <p class="subtitle">Start organizing your tasks</p>
        </div>
        
        <div id="message" class="message" aria-live="polite"></div>
        
        <form id="register-form" class="form">
          <div>
            <label for="register-username"><i class="fas fa-user"></i> Username</label>
            <input
              id="register-username"
              type="text"
              placeholder="John Doe"
              required
            />
          </div>

          <div>
            <label for="register-email"><i class="fas fa-envelope"></i> Email</label>
            <input
              id="register-email"
              type="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div>
            <label for="register-password"><i class="fas fa-lock"></i> Password</label>
            <input
              id="register-password"
              type="password"
              placeholder="Create a strong password"
              required
            />
          </div>

          <button type="submit" class="btn primary" style="width: 100%; margin-top: 8px;">
            <i class="fas fa-user-plus"></i> Register
          </button>
        </form>
        
        <div style="text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #e2e8f0;">
          <p style="margin: 0 0 8px 0;">Already have an account?</p>
          <a href="/login" style="font-weight: 600; text-decoration: underline;"><i class="fas fa-sign-in-alt"></i> Login</a>
        </div>
      </div>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
